

# ============================================
# Réseaux
# ============================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: false  # PostgreSQL accessible seulement par BookStack

# ============================================
# Volumes (persistance des données)
# ============================================
volumes:
  postgres_data:
    driver: local
  bookstack_uploads:
    driver: local
  bookstack_storage:
    driver: local
  grafana_data:
    driver: local

# ============================================
# Services
# ============================================
services:
  # ==========================================
  # 1. Base de données PostgreSQL
  # ==========================================
  database:
    image: postgres:15-alpine
    container_name: bookstack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-bookstack}
      POSTGRES_USER: ${DB_USERNAME:-bookstack_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookstack_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bookstack_user} -d ${DB_DATABASE:-bookstack}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # 2. Application BookStack
  # ==========================================
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bookstack-app
    restart: unless-stopped
    environment:
      # Application
      APP_URL: ${APP_URL:-http://localhost}
      APP_LANG: ${APP_LANG:-fr}
      APP_DEBUG: ${APP_DEBUG:-false}
      # Base de données
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-bookstack}
      DB_USERNAME: ${DB_USERNAME:-bookstack_user}
      DB_PASSWORD: ${DB_PASSWORD:-bookstack_password_123}
      # Sécurité
      APP_KEY: ${APP_KEY}
    volumes:
      - bookstack_uploads:/config/www/uploads
      - bookstack_storage:/config/www/storage
    networks:
      - backend
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # 3. Reverse Proxy Nginx (HTTPS)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: bookstack-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - frontend
      - backend
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # 4. Service de logs (Loki + Promtail)
  # ==========================================
  loki:
    image: grafana/loki:latest
    container_name: bookstack-loki
    ports:
      - "3100:3100"
    networks:
      - backend
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  promtail:
    image: grafana/promtail:latest
    container_name: bookstack-promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    restart: unless-stopped
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ==========================================
  # 5. Grafana pour visualisation logs
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: bookstack-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - backend
    depends_on:
      - loki
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

